version: '3.8'

services:
  seismicwatch:
    build: 
      context: .
      args:
        - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-seismicwatch-secret-key}
        - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:4080}
    ports:
      - "4080:4080"
    environment:
      - PORT=4080
      - DATABASE_URL=file:./dev.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-seismicwatch-secret-key}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:4080}
    volumes:
      - seismic-db:/app/prisma
    restart: unless-stopped

volumes:
  seismic-db:
